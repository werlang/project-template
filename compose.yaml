services:
    web:
        build: ./web
        volumes:
            - ./web:/app
            - node_modules_web:/app/node_modules
        restart: unless-stopped
        env_file:
            - .env
        command: npm run ${NODE_ENV:-development}
        networks:
            - template
        depends_on:
            - api
    api:
        build: ./api
        restart: unless-stopped
        env_file:
            - .env
        volumes:
            - ./api:/app
            - node_modules_api:/app/node_modules
        command: npm run ${NODE_ENV:-development}
        networks:
            - template
        depends_on:
            - mysql
    mysql:
        image: mysql:8.0
        restart: unless-stopped
        environment:
            - MYSQL_DATABASE=${MYSQL_DATABASE}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
        volumes:
            - mysql:/var/lib/mysql
            - ./database.sql:/docker-entrypoint-initdb.d/init.sql:ro
        ports:
            - 127.0.0.1:${MYSQL_PORT}:3306
        networks:
            - template
volumes:
    node_modules_web:
    node_modules_api:
    mysql:
networks:
    template:
        name: template
