<!doctype html>
<html lang="{{lang}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{pageTitle}}{{^pageTitle}}{{notfound:heading}}{{/pageTitle}}</title>
    <link rel="stylesheet" href="/css/index.min.css">
</head>
<body>
    {{{template-vars}}}
    <main id="frame">
        <section class="page-shell compact">
            <header class="page-header">
                <div>
                    <p class="eyebrow">{{notfound:eyebrow}}</p>
                    <h1>{{notfound:heading}}</h1>
                    <p class="summary">{{notfound:summary}}</p>
                </div>
            </header>
            <a class="text-link" href="/">{{notfound:returnHome}}</a>
        </section>
    </main>
</body>
</html>
